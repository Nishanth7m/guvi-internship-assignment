<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Developer Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center py-5">

    <!-- Toast Container for Notifications -->
    <div class="toast-container">
        <div id="statusToast" class="toast align-items-center border-0 glass-toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">
                    <!-- Dynamic message goes here -->
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Login Card -->
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="glass-card p-4 p-md-5">
                    
                    <!-- Heading -->
                    <div class="text-center mb-4">
                        <h1 class="gradient-text h2 mb-2">Welcome Back</h1>
                        <p class="text-secondary small">Authenticate to manage your developer profile.</p>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" novalidate>
                        
                        <!-- Email Address -->
                        <div class="mb-3">
                            <label for="emailAddress" class="glass-label">Email Address</label>
                            <input type="email" class="form-control glass-input" id="emailAddress" placeholder="john.doe@example.com" required autocomplete="email">
                            <div class="invalid-feedback">
                                Please enter a valid email address.
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="glass-label">Password</label>
                            <input type="password" class="form-control glass-input" id="password" placeholder="••••••••" required autocomplete="current-password">
                            <div class="invalid-feedback">
                                Please enter your password.
                            </div>
                        </div>

                        <!-- Remember Me (Visual only) -->
                        <div class="form-check mb-4 text-start">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-secondary small" for="rememberMe">
                                Remember this device (visual only)
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <button type="button" id="submitLoginBtn" class="btn btn-glass-primary w-100 mb-3">
                            <span class="spinner-border spinner-border-sm me-2 d-none" id="submitSpinner" role="status" aria-hidden="true"></span>
                            Login
                        </button>

                        <!-- Navigation Link -->
                        <div class="text-center">
                            <span class="text-secondary small">Don't have an account yet?</span>
                            <a href="register.html" class="glass-nav-link active small ms-1">Register here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom jQuery AJAX Login Script -->
    <script src="js/login.js"></script>
</body>
</html>
